[workspace]
authors = ["reonokiy <reonokiy@nokiy.net>"]
channels = ["conda-forge"]
name = "acfun"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
train-word2vec = "python scripts/train_word2vec.py"
build-bm25 = "python scripts/duckdb_bm25_search.py build"
query-bm25 = "python scripts/duckdb_bm25_search.py query"
query-word2vec = "python scripts/query_word2vec_terms.py"
export-word2vec-neo4j = "python scripts/export_word2vec_neo4j.py"

[dependencies]
numpy = ">=2.4.2,<3"
pandas = ">=3.0.1,<4"
scikit-learn = ">=1.8.0,<2"
duckdb = ">=1.4.4,<2"
pyarrow = ">=23.0.1,<24"
qdrant-client = ">=1.15.1,<2"
umap-learn = ">=0.5.9.post2,<0.6"
matplotlib = ">=3.10.8,<4"
jieba = ">=0.42.1,<0.43"
janome = ">=0.5.0,<0.6"
gensim = ">=4.4.0,<5"
